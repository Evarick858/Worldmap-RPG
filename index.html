<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>⚔ World Map</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #060a14; }
    #app { width: 100vw; height: 100vh; display: flex; flex-direction: column; font-family: 'Courier New', monospace; background: #060a14; overflow: hidden; user-select: none; }

    /* Top bar */
    #topbar {
      background: #0b1120;
      border-bottom: 1px solid #1e3a5f;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      flex-wrap: wrap;
      gap: 6px;
    }
    #topbar .title { color: #7dd3fc; font-weight: bold; font-size: 14px; letter-spacing: 3px; }
    #legend { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .legend-label { font-size: 9px; letter-spacing: 1px; }

    /* Map viewport */
    #viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
      cursor: grab;
    }
    #viewport.dragging { cursor: grabbing; }

    /* World canvas */
    #world {
      position: absolute;
      left: 0; top: 0;
      transform-origin: 0 0;
    }

    /* SVG edges */
    #edges-svg {
      position: absolute;
      left: 0; top: 0;
      pointer-events: none;
      overflow: visible;
    }

    /* Nodes */
    .node {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .node-circle {
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-size: 13px;
    }
    .node-label {
      position: absolute;
      top: 46px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      background: rgba(11,17,32,0.93);
      border-radius: 3px;
      font-size: 10px;
      padding: 2px 6px;
      pointer-events: none;
      z-index: 30;
      letter-spacing: 0.5px;
      display: none;
    }
    .node:hover .node-label,
    .node.selected .node-label { display: block; }

    /* Zoom controls */
    #zoom-controls {
      position: absolute;
      right: 14px;
      bottom: 70px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 50;
    }
    .zoom-btn {
      width: 36px; height: 36px;
      border-radius: 6px;
      background: #0b1120;
      border: 1px solid #1e3a5f;
      color: #7dd3fc;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      touch-action: manipulation;
    }
    .zoom-btn.reset { color: #475569; font-size: 16px; }

    /* Info panel */
    #info-panel {
      position: absolute;
      bottom: 14px;
      left: 14px;
      width: 230px;
      max-height: 60vh;
      overflow-y: auto;
      background: rgba(11,17,32,0.95);
      border-radius: 8px;
      padding: 14px 14px 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.55);
      display: none;
      z-index: 60;
    }
    #info-panel.visible { display: block; }
    #info-emoji { font-size: 26px; margin-bottom: 6px; }
    #info-name { color: #e2e8f0; font-weight: bold; font-size: 13px; margin-bottom: 6px; }
    #info-tags { display: flex; gap: 6px; margin-bottom: 10px; }
    .tag {
      padding: 1px 7px;
      border-radius: 3px;
      font-size: 9px;
      letter-spacing: 1px;
    }
    #info-conn-label { color: #64748b; font-size: 9px; letter-spacing: 1px; margin-bottom: 4px; }
    #info-conns { display: flex; flex-direction: column; gap: 3px; }
    .conn-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
      background: #0f1a2e;
      border: 1px solid #1e3a5f;
      border-radius: 4px;
      cursor: pointer;
    }
    .conn-item:hover { border-color: var(--accent); }
    .conn-emoji { font-size: 13px; }
    .conn-name { color: #cbd5e1; font-size: 10px; }
    .conn-sub { font-size: 9px; }
    #info-close {
      margin-top: 12px;
      width: 100%;
      padding: 5px 0;
      background: transparent;
      border: 1px solid #1e3a5f;
      color: #475569;
      font-size: 10px;
      cursor: pointer;
      border-radius: 4px;
      letter-spacing: 1px;
      font-family: 'Courier New', monospace;
    }

    /* Bottom bar */
    #bottombar {
      background: #0b1120;
      border-top: 1px solid #1e3a5f;
      padding: 5px 16px;
      display: flex;
      gap: 16px;
      align-items: center;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    #bottombar span { color: #334155; font-size: 10px; }
    #bottombar .sep { color: #1e3a5f; }
  </style>
</head>
<body>
<div id="app">

      <div id="info-name"></div>
      <div id="info-tags"></div>
      <div id="info-conn-label">CONNECTIONS</div>
      <div id="info-conns"></div>
      <button id="info-close">CLOSE</button>
    </div>
  </div>

  <!-- BOTTOM BAR -->

    <span class="sep">|</span>

  </div>
</div>

  6:  { node:"#e879f9", edge:"#701a75", glow:"#e879f933" },
  10: { node:"#fb923c", edge:"#7c2d12", glow:"#fb923c33" },
  20: { node:"#f87171", edge:"#7f1d1d", glow:"#f8717133" },
  30: { node:"#60a5fa", edge:"#1e3a5f", glow:"#60a5fa33" },
};

const CW = 1600, CH = 1200;

// ── Build edges ───────────────────────────────────────────────────────────────
function buildEdges() {
  const seen = new Set(), edges = [];
  for (const [id, loc] of Object.entries(RAW)) {
    for (const nb of loc.conn) {
      const key = [id,nb].sort().join("|");
      if (!seen.has(key) && POS[id] && POS[nb]) {
        seen.add(key);
        edges.push({ a:id, b:nb, level: Math.max(RAW[id].level, RAW[nb]?.level ?? 1) });
      }
    }
  }
  return edges;
}
const ALL_EDGES = buildEdges();

// ── State ─────────────────────────────────────────────────────────────────────
let pan = { x:0, y:0 }, zoom = 0.55;
let selectedId = null, hoveredId = null;
let dragging = false, lastMouse = {x:0,y:0}, pinchDist = null;

// ── DOM refs ──────────────────────────────────────────────────────────────────
const viewport   = document.getElementById("viewport");
const world      = document.getElementById("world");
const edgesSvg   = document.getElementById("edges-svg");
const infoPanel  = document.getElementById("info-panel");
const statsEl    = document.getElementById("stats");
const legendEl   = document.getElementById("legend");

// ── Legend ────────────────────────────────────────────────────────────────────
const legendLevels = [
  [1,"Lv1"],[2,"Lv2"],[3,"Lv3"],[4,"Lv4"],[5,"Lv5"],[6,"Lv6"],
  [10,"Lv10+"],[20,"Lv20+"],[30,"Lv30+"]
];
legendEl.innerHTML = legendLevels.map(([lv,label]) => {
  const c = LEVEL_COLOR[lv]?.node || "#999";
  return `<span class="legend-item">
    <span class="legend-dot" style="background:${c}"></span>
    <span class="legend-label" style="color:${c}">${label}</span>
  </span>`;
}).join("") + `<span style="color:#475569;font-size:9px;margin-left:8px">◼ safe &nbsp;● combat</span>`;

// ── Stats ──────────────────────────────────────────────────────────────────────
statsEl.textContent = `${Object.keys(RAW).length} locations · ${ALL_EDGES.length} connections`;

// ── Initial pan (centre map) ───────────────────────────────────────────────────
function initPan() {
  const W = viewport.clientWidth, H = viewport.clientHeight;
  pan = { x: W/2 - (CW*zoom)/2, y: H/2 - (CH*zoom)/2 };
}
initPan();

// ── Apply transform ────────────────────────────────────────────────────────────
function applyTransform() {
  world.style.transform = `translate(${pan.x}px,${pan.y}px) scale(${zoom})`;
  world.style.left = "0";
  world.style.top  = "0";
}
// Use translate on world directly since transform-origin is 0 0
world.style.transformOrigin = "0 0";
world.style.position = "absolute";
world.style.width = CW+"px";
world.style.height = CH+"px";
applyTransform();

// ── Draw edges ────────────────────────────────────────────────────────────────
function drawEdges() {
  const focusNeighbors = selectedId
    ? new Set([selectedId, ...RAW[selectedId].conn.filter(n=>POS[n])])
    : hoveredId
    ? new Set([hoveredId, ...RAW[hoveredId].conn.filter(n=>POS[n])])
    : null;

  let html = `<defs>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>`;
  for (const {a,b,level} of ALL_EDGES) {
    const [ax,ay]=POS[a],[bx,by]=POS[b];
    const c = LEVEL_COLOR[level] || LEVEL_COLOR[1];
    const dimmed = focusNeighbors && (!focusNeighbors.has(a)||!focusNeighbors.has(b));
    html += `<line x1="${ax}" y1="${ay}" x2="${bx}" y2="${by}"
      stroke="${dimmed?"#1e3a5f":c.edge}"
      stroke-width="${dimmed?1:2}"
      stroke-opacity="${dimmed?0.25:0.85}"/>`;
  }
  edgesSvg.innerHTML = html;
}

// ── Draw nodes ────────────────────────────────────────────────────────────────
const nodeEls = {};
function createNodes() {
  for (const [id, loc] of Object.entries(RAW)) {
    if (!POS[id]) continue;
    const [x,y] = POS[id];
    const c = LEVEL_COLOR[loc.level] || LEVEL_COLOR[1];
    const el = document.createElement("div");
    el.className = "node";
    el.dataset.id = id;
    el.style.left = (x-22)+"px";
    el.style.top  = (y-22)+"px";
    el.style.width = "44px";
    el.style.height = "44px";
    el.style.zIndex = 10;

    const circle = document.createElement("div");
    circle.className = "node-circle";
    circle.style.width = "26px";
    circle.style.height = "26px";
    circle.style.borderRadius = loc.safe ? "4px" : "50%";
    circle.style.background = c.glow;
    circle.style.border = `2px solid ${c.node}`;
    circle.style.boxShadow = `0 0 4px ${c.node}88`;
    circle.textContent = loc.emoji[0];

    const label = document.createElement("div");
    label.className = "node-label";
    label.style.color = c.node;
    label.style.borderColor = c.node+"66";
    label.textContent = loc.name;

    el.appendChild(circle);
    el.appendChild(label);
    world.appendChild(el);
    nodeEls[id] = { el, circle, c, loc };

    el.addEventListener("click", (e) => { e.stopPropagation(); selectNode(selectedId===id ? null : id); });
    el.addEventListener("mouseenter", () => { hoveredId=id; updateNodeStyles(); drawEdges(); });
    el.addEventListener("mouseleave", () => { hoveredId=null; updateNodeStyles(); drawEdges(); });
  }
}

function updateNodeStyles() {
  const focusNeighbors = selectedId
    ? new Set([selectedId, ...RAW[selectedId].conn.filter(n=>POS[n])])
    : hoveredId
    ? new Set([hoveredId, ...RAW[hoveredId].conn.filter(n=>POS[n])])
    : null;

  for (const [id, {el, circle, c, loc}] of Object.entries(nodeEls)) {
    const isSelected = id === selectedId;
    const isHovered  = id === hoveredId;
    const dimmed = focusNeighbors && !focusNeighbors.has(id);
    const highlight = focusNeighbors && focusNeighbors.has(id) && id !== (selectedId||hoveredId);

    el.style.opacity = dimmed ? "0.15" : "1";
    el.style.zIndex  = isSelected ? "20" : isHovered ? "15" : "10";

    const size = isSelected ? "34px" : highlight ? "30px" : "26px";
    circle.style.width  = size;
    circle.style.height = size;
    circle.style.background = isSelected ? c.node : c.glow;
    circle.style.boxShadow = (isSelected||isHovered) ? `0 0 14px ${c.node}` : `0 0 4px ${c.node}88`;
    circle.style.fontSize = isSelected ? "16px" : "13px";

    if (isSelected) el.classList.add("selected");
    else el.classList.remove("selected");
  }
}

function selectNode(id) {
  selectedId = id;
  updateNodeStyles();
  drawEdges();
  renderInfoPanel();
}

// ── Info panel ────────────────────────────────────────────────────────────────
function renderInfoPanel() {
  if (!selectedId) {
    infoPanel.classList.remove("visible");
    return;
  }
  const loc = RAW[selectedId];
  const c = LEVEL_COLOR[loc.level]?.node || "#999";
  infoPanel.style.borderColor = c+"55";
  infoPanel.classList.add("visible");

  document.getElementById("info-emoji").textContent = loc.emoji;
  document.getElementById("info-name").textContent  = loc.name;

  const tagsEl = document.getElementById("info-tags");
  tagsEl.innerHTML =
    `<span class="tag" style="background:${c}22;border:1px solid ${c}55;color:${c}">Lv ${loc.level}</span>` +
    `<span class="tag" style="background:${loc.safe?"#4ade8022":"#f8717122"};border:1px solid ${loc.safe?"#4ade8055":"#f8717155"};color:${loc.safe?"#4ade80":"#f87171"}">${loc.safe?"🛡 SAFE":"⚔ COMBAT"}</span>`;

  const connsEl = document.getElementById("info-conns");
  connsEl.innerHTML = loc.conn.filter(n=>RAW[n]).map(nb => {
    const n = RAW[nb];
    const nc = LEVEL_COLOR[n.level]?.node || "#999";
    return `<div class="conn-item" style="--accent:${nc}" onclick="selectNode('${nb}')">
      <span class="conn-emoji">${n.emoji[0]}</span>
      <div>
        <div class="conn-name">${n.name}</div>
        <div class="conn-sub" style="color:${nc}">Lv ${n.level} · ${n.safe?"Safe":"Combat"}</div>
      </div>
    </div>`;
  }).join("");
}

document.getElementById("info-close").addEventListener("click", (e) => {
  e.stopPropagation();
  selectNode(null);
});
infoPanel.addEventListener("mousedown", e => e.stopPropagation());

// ── Pan & Zoom ────────────────────────────────────────────────────────────────
function clampPan() {
  // allow some freedom but keep map reachable
}

function doZoom(factor, cx, cy) {
  const nz = Math.min(3, Math.max(0.18, zoom * factor));
  const scale = nz / zoom;
  pan.x = cx - (cx - pan.x) * scale;
  pan.y = cy - (cy - pan.y) * scale;
  zoom = nz;
  applyTransform();
}

// Mouse
viewport.addEventListener("mousedown", e => {
  if (e.target.closest(".node") || e.target.closest("#info-panel") || e.target.closest("#zoom-controls")) return;
  dragging = true;
  lastMouse = { x:e.clientX, y:e.clientY };
  viewport.classList.add("dragging");
});
window.addEventListener("mousemove", e => {
  if (!dragging) return;
  pan.x += e.clientX - lastMouse.x;
  pan.y += e.clientY - lastMouse.y;
  lastMouse = { x:e.clientX, y:e.clientY };
  applyTransform();
});
window.addEventListener("mouseup", () => { dragging=false; viewport.classList.remove("dragging"); });

// Wheel
viewport.addEventListener("wheel", e => {
  e.preventDefault();
  const rect = viewport.getBoundingClientRect();
  doZoom(e.deltaY < 0 ? 1.12 : 0.9, e.clientX-rect.left, e.clientY-rect.top);
}, { passive:false });

// Touch
viewport.addEventListener("touchstart", e => {
  if (e.touches.length === 1) {
    if (e.target.closest(".node") || e.target.closest("#info-panel") || e.target.closest("#zoom-controls")) return;
    dragging = true;
    lastMouse = { x:e.touches[0].clientX, y:e.touches[0].clientY };
  } else if (e.touches.length === 2) {
    dragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchDist = Math.sqrt(dx*dx+dy*dy);
  }
}, { passive:true });

viewport.addEventListener("touchmove", e => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    pan.x += e.touches[0].clientX - lastMouse.x;
    pan.y += e.touches[0].clientY - lastMouse.y;
    lastMouse = { x:e.touches[0].clientX, y:e.touches[0].clientY };
    applyTransform();
  } else if (e.touches.length === 2 && pinchDist !== null) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const rect = viewport.getBoundingClientRect();
    const cx = (e.touches[0].clientX+e.touches[1].clientX)/2 - rect.left;
    const cy = (e.touches[0].clientY+e.touches[1].clientY)/2 - rect.top;
    doZoom(dist/pinchDist, cx, cy);
    pinchDist = dist;
  }
}, { passive:false });

viewport.addEventListener("touchend", () => { dragging=false; pinchDist=null; });

// Zoom buttons
document.getElementById("btn-zoomin").addEventListener("click", () => {
  const W=viewport.clientWidth, H=viewport.clientHeight;
  doZoom(1.2, W/2, H/2);
});
document.getElementById("btn-zoomout").addEventListener("click", () => {
  const W=viewport.clientWidth, H=viewport.clientHeight;
  doZoom(0.8, W/2, H/2);
});
document.getElementById("btn-reset").addEventListener("click", () => {
  zoom = 0.55;
  const W=viewport.clientWidth, H=viewport.clientHeight;
  pan = { x: W/2-(CW*zoom)/2, y: H/2-(CH*zoom)/2 };
  applyTransform();
});

// Deselect on viewport click
viewport.addEventListener("click", e => {
  if (!e.target.closest(".node") && !e.target.closest("#info-panel") && !e.target.closest("#zoom-controls")) {
    selectNode(null);
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
createNodes();
drawEdges();
applyTransform();
</script>
</body>
</html>
